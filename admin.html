        function addProduct() {
            const shopId = document.getElementById('shop-select').value;
            const name = document.getElementById('p-name').value;
            const cat = document.getElementById('p-cat').value;
            const price = document.getElementById('p-price').value;
            const img = document.getElementById('p-img').value;

            if(!name || !cat || !price || !img) return alert("Fill everything!");

            // 1. Load current storage
            let data = JSON.parse(localStorage.getItem('custom_inventory')) || {};

            // 2. Initialize shop/category if empty
            if (!data[shopId]) data[shopId] = {};
            if (!data[shopId][cat]) data[shopId][cat] = [];

            // 3. Add item
            data[shopId][cat].push({
                name: name,
                price: parseFloat(price),
                image: img
            });

            // 4. Save back
            localStorage.setItem('custom_inventory', JSON.stringify(data));
            alert("Success! Check your storefront.");

            
        }
